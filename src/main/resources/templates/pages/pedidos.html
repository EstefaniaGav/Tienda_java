<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Tienda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('pedidos')}"></div>
    
    <div class="main-content">
        <h1>Pedidos</h1>
        <div class="d-flex align-items-center mb-4">
            <button class="btn btn-success me-3" data-bs-toggle="modal" data-bs-target="#pedidoModal">  
                <i class="fas fa-plus"></i> Crear Pedido
            </button>
        </div>
        
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Número factura</th>
                        <th>Descripción</th>
                        <th>Cantidad</th>
                        <th>Producto</th>
                        <th>Cliente</th>
                        <th>Empleado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>123456</td>
                        <td>Descripción del pedido</td>
                        <td>2</td>
                        <td>Laptop</td>
                        <td>Juan Perez</td>
                        <td>Mariana Torres</td>
                        <td>
                            <button class="btn btn-sm btn btn-secondary me-1" data-bs-toggle="modal" data-bs-target="#pedidoModal">
                                <i class="fas fa-edit"></i> 
                            </button>
                            <button class="btn btn-sm btn-danger">
                                <i class="fas fa-trash"></i> 
                            </button>
                        </td>
                    </tr>
                  
                    <tr>
                        <td>2</td>
                        <td>789012</td>
                        <td>Otro pedido</td>
                        <td>1</td>
                        <td>Mouse</td>
                        <td>María López</td>
                        <td>Mariana Torres</td>
                        <td>
                            <button class="btn btn-sm btn btn-secondary me-1" data-bs-toggle="modal" data-bs-target="#pedidoModal">
                                <i class="fas fa-edit"></i> 
                            </button>
                            <button class="btn btn-sm btn-danger">
                                <i class="fas fa-trash"></i> 
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="modal fade" id="pedidoModal" tabindex="-1" aria-labelledby="pedidoModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="pedidoModalLabel">Pedido</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="numeroFactura" class="form-label">Número Factura</label>
                            <input type="text" class="form-control" id="numeroFactura" placeholder="Ingrese número de factura">
                        </div>
                        <div class="mb-3">
                            <label for="descripcion" class="form-label">Descripción</label>
                            <textarea class="form-control" id="descripcion" rows="3" placeholder="Ingrese descripción del pedido"></textarea>
                        </div>
                         <div class="mb-3">
                            <label for="cantidad" class="form-label">Cantidad</label>
                            <input type="text" class="form-control" id="cantidad" placeholder="Ingrese cantidad">
                        </div>
                             <div class="mb-3">
                            <label for="empleado" class="form-label">Producto</label>
                            <select class="form-select" id="empleado">
                                <option selected>Seleccione producto</option>
                                <option value="1">Laptop</option>
                                <option value="2">Mouse</option>
                                <option value="3">Teclado</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="cliente" class="form-label">Cliente</label>
                            <select class="form-select" id="cliente">
                                <option selected>Seleccione cliente</option>
                                <option value="1">Esteban Quito</option>
                                <option value="2">María López</option>
                                <option value="3">Carlos Ruiz</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="empleado" class="form-label">Empleado</label>
                            <select class="form-select" id="empleado">
                                <option selected>Seleccione empleado</option>
                                <option value="1">Juan Perez</option>
                                <option value="2">Marana Torres</option>
                                <option value="3">Ana Garcia</option>
                            </select>
                        </div>
                        
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
