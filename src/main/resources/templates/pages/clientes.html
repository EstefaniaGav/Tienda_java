<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Tienda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('clientes')}"></div>
 
    <div class="main-content">
        <h1>Clientes</h1>       
        <div class="d-flex align-items-center mb-4">
            <button class="btn btn-success me-3" data-bs-toggle="modal" data-bs-target="#clienteModal">  
                <i class="fas fa-plus"></i> Crear Cliente
            </button>
        </div>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombres</th>
                        <th>Apellidos</th>
                        <th>Tipo Documento</th>
                        <th>Número Documento</th>
                        <th>Segmento Cliente</th>
                        <th>Fecha Nacimiento</th> 
                        <th>Fecha Creación</th> 
                        <th>Acciones</th>                
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cliente : ${clientes}">
                        <td th:text="${cliente.IdCliente}"></td>
                        <td th:text="${cliente.nombres}"></td>
                        <td th:text="${cliente.apellidos}"></td>
                        <td th:text="${cliente.tipoDocumento}"></td>
                        <td th:text="${cliente.numeroDocumento}"></td>
                        <td th:text="${cliente.segmentoCliente}"></td>
                        <td th:text="${cliente.fechaNacimiento}"></td>  
                        <td th:text="${cliente.fechaCreacion}"></td>
                        <td>
                            <button class="btn btn-sm btn-primary me-1" data-bs-toggle="modal" data-bs-target="#clienteModal">
                                <i class="fas fa-edit"></i> 
                            </button>
                            <button class="btn btn-sm btn-danger">
                                <i class="fas fa-trash"></i> 
                            </button>
                        </td>
                    </tr>               
                   
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="clienteModal" tabindex="-1" aria-labelledby="clienteModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="clienteModalLabel">Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form th:action="@{/clientes/crear}" method="post" th:object="${cliente}" id="crearForm">
                        <input type="hidden" th:field="*{IdCliente}" id="crearId">
                        <div class="mb-3">
                            <label for="crearNombres" class="form-label">Nombres</label>
                            <input type="text" class="form-control" id="crearNombres" th:field="*{nombres}" placeholder="Ingrese nombres">
                        </div>
                        <div class="mb-3">
                            <label for="crearApellidos" class="form-label">Apellidos</label>
                            <input type="text" class="form-control" id="crearApellidos" th:field="*{apellidos}" placeholder="Ingrese apellidos" required>
                        </div>
                        <div class="mb-3">
                            <label for="crearTipoDocumento" class="form-label">Tipo Documento</label>
                            <select class="form-select" id="crearTipoDocumento" th:field="*{tipoDocumento}" required>
                                <option selected>Seleccione tipo</option>
                                <option value="CC">Cédula de Ciudadanía</option>
                                <option value="TI">Tarjeta de Identidad</option>
                                <option value="CE">Cédula de Extranjería</option>
                                <option value="PP">Pasaporte</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="crearNumeroDocumento" class="form-label">Número Documento</label>
                            <input type="number" class="form-control" id="crearNumeroDocumento" th:field="*{numeroDocumento}" placeholder="Ingrese número de documento">
                        </div>
                        <div class="mb-3">
                            <label for="crearSegmentoCliente" class="form-label">Segmento Cliente</label>
                            <select class="form-select" id="crearSegmentoCliente" th:field="*{segmentoCliente}" required>
                                <option selected>Seleccione segmento</option>
                                <option value="Regular">Regular</option>
                                <option value="Premium">Premium</option>
                                <option value="VIP">VIP</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="crearFechaNacimiento" class="form-label">Fecha Nacimiento</label>
                            <input type="date" class="form-control" id="crearFechaNacimiento" th:field="*{fechaNacimiento}">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
