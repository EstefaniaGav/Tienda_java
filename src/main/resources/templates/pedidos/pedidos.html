<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Tienda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('pedidos')}"></div>
    
    <div class="main-content">
        <h1>Pedidos</h1>
        <div class="d-flex align-items-center mb-4">
            <a href="#" class="btn btn-success me-3">  
                <i class="fas fa-plus"></i> Crear Pedido
            </a>
        </div>
        
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Número factura</th>
                        <th>Descripción</th>
                        <th>Cliente</th>
                        <th>Empleado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>123456</td>
                        <td>Descripción del pedido</td>
                        <td>Esteban Quito</td>
                        <td>Juan Perez</td>
                        <td>
                            <button class="btn btn-sm btn btn-secondary me-1">
                                <i class="fas fa-edit"></i> 
                            </button>
                            <button class="btn btn-sm btn-danger">
                                <i class="fas fa-trash"></i> 
                            </button>
                        </td>
                    </tr>
                  
                    <tr>
                        <td>2</td>
                        <td>789012</td>
                        <td>Otro pedido</td>
                        <td>María López</td>
                        <td>Marana Torres</td>
                        <td>
                            <button class="btn btn-sm btn btn-secondary me-1">
                                <i class="fas fa-edit"></i> 
                            </button>
                            <button class="btn btn-sm btn-danger">
                                <i class="fas fa-trash"></i> 
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
